services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: xtyres-frontend-app
    restart: unless-stopped
    working_dir: /app
    env_file:
      - .env
    ports:
      - "5174:5174"
    volumes:
      - .:/app
      - frontend_node_modules:/app/node_modules
    command:
      - sh
      - docker/start.sh

volumes:
  frontend_node_modules:
