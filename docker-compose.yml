services:
  postgres:
    image: postgres:16-alpine
    container_name: xtyres-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-xtyres}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-xtyres}']
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./xtyres-backend
      dockerfile: Dockerfile
    container_name: xtyres-backend
    restart: unless-stopped
    working_dir: /var/www/html
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - '${BACKEND_APP_PORT:-8000}:${BACKEND_APP_PORT:-8000}'
      - '${BACKEND_VITE_PORT:-5173}:${BACKEND_VITE_PORT:-5173}'
    environment:
      APP_NAME: ${BACKEND_APP_NAME:-XTyres}
      APP_ENV: ${BACKEND_APP_ENV:-local}
      APP_KEY: ${BACKEND_APP_KEY:-base64:QnmqNRxeS4giSLZ34SNsnJz1o6oMfj2nb81ak5/4Ktc=}
      APP_DEBUG: '${BACKEND_APP_DEBUG:-true}'
      APP_URL: ${BACKEND_APP_URL:-http://localhost:8000}
      APP_LOCALE: ${BACKEND_APP_LOCALE:-ro}
      APP_FALLBACK_LOCALE: ${BACKEND_APP_FALLBACK_LOCALE:-ru}
      APP_FAKER_LOCALE: ${BACKEND_APP_FAKER_LOCALE:-ro_MD}
      APP_TIMEZONE: ${BACKEND_APP_TIMEZONE:-Europe/Chisinau}
      LOG_CHANNEL: ${BACKEND_LOG_CHANNEL:-stack}
      LOG_STACK: ${BACKEND_LOG_STACK:-single}
      LOG_LEVEL: ${BACKEND_LOG_LEVEL:-debug}
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${POSTGRES_DB:-xtyres}
      DB_USERNAME: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      SESSION_DRIVER: database
      SESSION_LIFETIME: 120
      SESSION_ENCRYPT: 'false'
      SESSION_PATH: /
      SESSION_DOMAIN: null
      BROADCAST_CONNECTION: log
      FILESYSTEM_DISK: local
      QUEUE_CONNECTION: database
      CACHE_STORE: database
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5174}
      ADMIN_EMAIL: ${BACKEND_ADMIN_EMAIL:-admin@xtyres.local}
      ADMIN_PASSWORD: ${BACKEND_ADMIN_PASSWORD:-password}
      APP_PORT: ${BACKEND_APP_PORT:-8000}
      VITE_HOST: ${BACKEND_VITE_HOST:-0.0.0.0}
      VITE_PORT: ${BACKEND_VITE_PORT:-5173}
      VITE_HMR_HOST: ${BACKEND_VITE_HMR_HOST:-localhost}
      VITE_DEV_SERVER_URL: ${BACKEND_VITE_DEV_SERVER_URL:-http://localhost:5173}
      VITE_USE_POLLING: '${BACKEND_VITE_USE_POLLING:-true}'
    volumes:
      - ./xtyres-backend:/var/www/html
      - backend_vendor:/var/www/html/vendor
      - backend_node_modules:/var/www/html/node_modules
    command: ['sh', 'docker/start.sh']

  frontend:
    build:
      context: ./xtyres-frontend
      dockerfile: Dockerfile
    container_name: xtyres-frontend
    restart: unless-stopped
    working_dir: /app
    depends_on:
      - backend
    ports:
      - '${FRONTEND_PORT:-5174}:${FRONTEND_PORT:-5174}'
    environment:
      VITE_API_BASE_URL: ${FRONTEND_API_BASE_URL:-http://localhost:8000/api/storefront}
      VITE_HOST: ${FRONTEND_VITE_HOST:-0.0.0.0}
      VITE_PORT: ${FRONTEND_PORT:-5174}
      VITE_HMR_HOST: ${FRONTEND_VITE_HMR_HOST:-localhost}
      VITE_USE_POLLING: '${FRONTEND_VITE_USE_POLLING:-true}'
    volumes:
      - ./xtyres-frontend:/app
      - frontend_node_modules:/app/node_modules
    command: ['sh', 'docker/start.sh']

volumes:
  postgres_data:
  backend_vendor:
  backend_node_modules:
  frontend_node_modules:
